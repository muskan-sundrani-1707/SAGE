<div class="accessibility-bar" id="accessibilityBar">
    <button class="accessibility-btn" id="languageToggle" title="Toggle Language">
        <span class="btn-icon">🌐</span>
        <span class="btn-text" data-en="English / हिंदी" data-hi="English / हिंदी">English / हिंदी</span>
    </button>
    <button class="accessibility-btn" id="largeTextToggle" title="Large Text Mode">
        <span class="btn-icon">🔤</span>
        <span class="btn-text" data-en="Large Text" data-hi="बड़ा टेक्स्ट">Large Text</span>
    </button>
    <button class="accessibility-btn" id="voiceNarrationBtn" title="Voice Narration">
        <span class="btn-icon">🔊</span>
        <span class="btn-text" data-en="Listen" data-hi="सुनें">Listen</span>
    </button>
</div>
